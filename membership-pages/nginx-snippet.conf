# Subsequent slugs land here as separate `location ^~ /<slug>/` blocks following
# the same pattern, each pointing at its own /home/ubuntu/projects/membership-pages/web/<slug>.php
# front controller. Keeping them separate (rather than one regex + dispatcher)
# matches the events / archive-poc / bb-mirror convention and keeps each surface
# independently routable + observable.
