# ===== membership-pages — standalone membership-page surfaces =====
# Owns: /membership-guide/ (PoC), then incrementally:
#   /lgjoin/, /lggift-buy/, /lggift/, /manage-subscription/, /my-gifts/,
#   /affiliate-earnings/, /request-refund/, /welcome/,
#   /regional-pricing-not-available/, /test-checklist/
#
# Source-of-truth: /home/ubuntu/projects/membership-pages/
# Live serving (dev): same path (alias points at the project dir; matches
#                     the events surface pattern, no /srv/ copy on dev)
# FPM pool: php8.3-fpm-membership.sock  (provision before deploy — see
#                                        SESSION-HANDOFF "deploy checklist")
# Data: read-only WP MySQL (creds /etc/lg-membership-db; events DB creds
#       are an acceptable dev fallback if the membership-specific secret
#       isn't provisioned yet — config.php auto-detects).
# Authoritative scope: STRANGLER-COORDINATION.md §0b (standalone invariant)
#                      + briefing-membership-pages.md.
#
# Convention parity: this snippet mirrors strangler-events.conf in shape
# (alias + try_files + explicit location for the front controller + assets
# location for cache-bust). See that snippet for prior-art rationale.

# Asset mount (LG_MEMBERSHIP_PUBLIC_PATH = /membership-pages) — serves the web/
# static files (CSS/JS, ?v=<mtime>-busted) that every surface links to. Without
# this, /membership-pages/<file>.css 404s and the pages render unstyled. Front
# controllers are reached via their own /<slug>/ locations, never here; PHP denied.
location ^~ /membership-pages/ {
    if ($loothdev_is_authorized != 1) { return 403; }
    alias /home/ubuntu/projects/membership-pages/web/;
    location ~ \.php$ { return 403; }
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4)$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }
    try_files $uri =404;
}

# /membership-guide/ — first surface (PoC of standalone delivery shape)
location ^~ /membership-guide/ {
    if ($loothdev_is_authorized != 1) { return 403; }

    alias /home/ubuntu/projects/membership-pages/web/;
    try_files $uri /membership-guide/membership-guide.php;

    # Static assets are ?v=<mtime>-busted → safe to cache hard. Gate re-asserted
    # (an `if` does not inherit into nested locations).
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4)$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location = /membership-guide/membership-guide.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-membership.sock;
        fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/membership-pages/web/membership-guide.php;
    }
    # No other PHP files are reachable directly under this location.
    location ~ \.php$ { return 403; }
}

# /manage-subscription/ — read-only Patreon membership (launch-critical)
location ^~ /manage-subscription/ {
    if ($loothdev_is_authorized != 1) { return 403; }

    alias /home/ubuntu/projects/membership-pages/web/;
    try_files $uri /manage-subscription/manage-subscription.php;

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4)$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location = /manage-subscription/manage-subscription.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-membership.sock;
        fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/membership-pages/web/manage-subscription.php;
    }
    location ~ \.php$ { return 403; }
}

# /join/ — public Patreon onboarding entry (anon; dev cookie gate only). Drives
# the poller authorize-entry contract: CTA → /patreon-connect?return=/join/,
# callback returns to /join/?onboarded=<status>. Direct fastcgi (not alias +
# try_files) so the ?onboarded query param reaches PHP cleanly — the alias +
# try_files + ?$args combo drops/404s the query under nginx. Assets load from
# the /membership-pages/ mount above. Single front-controller page, no co-located
# assets to alias, so the exact-match location is the right tool here.
location = /join { return 301 /join/; }
location = /join/ {
    if ($loothdev_is_authorized != 1) { return 403; }
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-membership.sock;
    fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/membership-pages/web/join.php;
    fastcgi_param QUERY_STRING $args;
}

# /connect-your-patreon/ — Patreon-connect funnel (admin-only pre-launch). Has a
# ?onboarded=<status> callback param, so direct fastcgi (not alias+try_files,
# which drops the query under nginx) — same shape as /join/ above.
location = /connect-your-patreon { return 301 /connect-your-patreon/; }
location = /connect-your-patreon/ {
    if ($loothdev_is_authorized != 1) { return 403; }
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-membership.sock;
    fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/membership-pages/web/connect-your-patreon.php;
    fastcgi_param QUERY_STRING $args;
}

