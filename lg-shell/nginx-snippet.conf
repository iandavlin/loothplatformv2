# ===== lg-shared — shared header/footer partial + CSS =====
# Owned by lg-shell workstream.
# PHP partials included server-side: require_once '/srv/lg-shared/site-header.php'
# CSS served over HTTP: <link rel="stylesheet" href="/lg-shared/site-header.css">
#
# Source of truth lives at /srv/lg-shared/ on this machine.
# Deploy: sudo cp <project>/nginx-snippet.conf /etc/nginx/snippets/lg-shared.conf
#         sudo nginx -t && sudo systemctl reload nginx

location ^~ /lg-shared/ {
    if ($loothdev_is_authorized != 1) { return 403; }
    alias /srv/lg-shared/;
    location ~* \.(css|js)$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
    location ~ \.php$ { return 403; }
    try_files $uri =404;
}
