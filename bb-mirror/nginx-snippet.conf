# ===== bb-mirror — read-side strangler for BB forum threads =====
# Owns: /forums-poc/ (pre-cutover mount, flips to /forums/ at §4 step 5)
#       /bb-mirror-api/v0/_sync (loopback-only, runs on WP pool for $wpdb access)
#       /bb-mirror-api/v0/auth  (browser-callable, dev-cookie-gated, mints REST nonce)
# Source: /home/ubuntu/projects/bb-mirror/
# FPM pool: php8.3-fpm-bb-mirror.sock (frontend)
#           php8.3-fpm-looth-dev.sock (loopback _sync + auth, needs $wpdb)
# Kill-switch: ?bb_native=1 falls through to BB's WP-rendered templates.
# Authoritative scope: /home/ubuntu/projects/docs/STRANGLER-COORDINATION.md §3f
#
# Query-string note: nginx alias + try_files fallback + fastcgi-php.conf
# does NOT preserve $args reliably (QUERY_STRING ends up empty in PHP).
# The front controller parses $_SERVER['REQUEST_URI'] for query args
# rather than trusting $_GET. $request_uri is preserved through rewrites.

# Legacy bases -> canonical /hub/ (301). Rebrand /forum/ -> /hub/ (2026-06-01).
# Front controller strips /hub (LG_BB_MIRROR_PUBLIC_PATH) + /forum + /forums-poc +
# /forums, so deep links collapse cleanly; rewrite preserves path + query.
location ^~ /forums-poc/ {
    rewrite ^/forums-poc/(.*)$ /hub/$1 permanent;
}
location ^~ /forums/ {
    rewrite ^/forums/(.*)$ /hub/$1 permanent;
}
location ^~ /forum/ {
    rewrite ^/forum/(.*)$ /hub/$1 permanent;
}

# Canonical /hub/ — the forum, rebranded "The Hub" (2026-06-01). Same web dir, FPM
# pool, gate, hard-cache. Front controller strips /hub (LG_BB_MIRROR_PUBLIC_PATH) +
# the legacy /forum //forums //forums-poc bases, so it routes any of them.
location ^~ /hub/ {
    if ($loothdev_is_authorized != 1) { return 403; }
    if ($arg_bb_native = "1") { rewrite ^ /index.php last; }

    alias /home/ubuntu/projects/bb-mirror/web/;

    try_files $uri /hub/index.php;

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4)$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location = /hub/index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-bb-mirror.sock;
        fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/bb-mirror/web/index.php;
    }
    location ~ \.php$ { return 403; }
}

# bb-mirror API — runs on WP FPM pool (looth-dev) for $wpdb / WP context.
# _sync.php is loopback-only; auth.php is browser-callable, dev-cookie-gated.
location ^~ /bb-mirror-api/v0/ {
    alias /home/ubuntu/projects/bb-mirror/api/v0/;
    rewrite ^/bb-mirror-api/v0/_sync/?$ /bb-mirror-api/v0/_sync.php last;
    rewrite ^/bb-mirror-api/v0/auth/?$  /bb-mirror-api/v0/auth.php  last;
    rewrite ^/bb-mirror-api/v0/reply/?$ /bb-mirror-api/v0/reply.php last;
    rewrite ^/bb-mirror-api/v0/topic/?$ /bb-mirror-api/v0/topic.php?$args last;
    rewrite ^/bb-mirror-api/v0/set-forum-image/?$ /bb-mirror-api/v0/set-forum-image.php last;

    location = /bb-mirror-api/v0/_sync.php {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    location = /bb-mirror-api/v0/auth.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # topic — browser-callable single-topic READ fragment for the front-page
    # discussion modal. PG-only (no WP) → runs on the bb-mirror FPM pool, the
    # SAME pool + visibility masks as the /hub single-topic page (modal==page).
    location = /bb-mirror-api/v0/topic.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-bb-mirror.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # reply — browser-callable reply-WRITE, dev-cookie-gated; WP cookie = author.
    # The owned reply-write path for /stream/ + /hub/ (POST). Contract:
    # docs/reply-write-endpoint.md
    location = /bb-mirror-api/v0/reply.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # mark-seen + unread — browser-callable, dev-cookie-gated, WP cookie reads viewer.
    location = /bb-mirror-api/v0/mark-seen.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
    location = /bb-mirror-api/v0/unread.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # set-forum-image — browser-callable (admin), dev-cookie-gated; writes pg.
    location = /bb-mirror-api/v0/set-forum-image.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
}
