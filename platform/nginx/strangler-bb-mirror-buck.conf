# ===== bb-mirror — read-side strangler for BB forum threads =====
# Owns: /forums-poc/ (pre-cutover mount, flips to /forums/ at §4 step 5)
#       /bb-mirror-api/v0/_sync (loopback-only, runs on WP pool for $wpdb access)
#       /bb-mirror-api/v0/auth  (browser-callable, dev-cookie-gated, mints REST nonce)
# Source: /home/buck/loothplatformv2/bb-mirror/
# FPM pool: php8.3-fpm-bb-mirror.sock (frontend)
#           php8.3-fpm-looth-dev.sock (loopback _sync + auth, needs $wpdb)
# Kill-switch: ?bb_native=1 falls through to BB's WP-rendered templates.
# Authoritative scope: /home/ubuntu/projects/docs/STRANGLER-COORDINATION.md §3f
#
# Query-string note: nginx alias + try_files fallback + fastcgi-php.conf
# does NOT preserve $args reliably (QUERY_STRING ends up empty in PHP).
# The front controller parses $_SERVER['REQUEST_URI'] for query args
# rather than trusting $_GET. $request_uri is preserved through rewrites.

# Legacy bases -> canonical /hub/ (301). Rebrand /forum/ -> /hub/ (2026-06-01).
# Front controller strips /hub (LG_BB_MIRROR_PUBLIC_PATH) + /forum + /forums-poc +
# /forums, so deep links collapse cleanly; rewrite preserves path + query.
location ^~ /forums-poc/ {
    rewrite ^/forums-poc/(.*)$ /hub/$1 permanent;
}
location ^~ /forums/ {
    rewrite ^/forums/(.*)$ /hub/$1 permanent;
}
location ^~ /forum/ {
    rewrite ^/forum/(.*)$ /hub/$1 permanent;
}

# ===== SEO continuity (cut lane 2026-06-15): preserve old bbPress search equity =====
# Old indexed bbPress topic/group/member URLs are ~69% of our Google footprint (GSC
# 2026-06-15). The cut changes URL structure; any old URL that 404s loses its ranking.
# Topic permalinks → the slug-resolver (DB maps the unique topic slug → its forum, so
# we can build /hub/<forum>/<slug>/); reply/tag/landing tails have no resolvable topic
# slug → straight 301 to /hub/. NEVER 404. 301 is mandatory — a 302 keeps Google on the
# OLD URL and transfers no equity. These blocks are intentionally UNGATED: the redirect
# itself leaks nothing (it lands on the gated /hub), and Googlebot is anonymous; at the
# cut the cookie gate is removed and the whole chain becomes public.
#
# /all-forums-all-topics/topic/<slug>/  → resolve.  reply/topic-tag/other → /hub.
location ^~ /all-forums-all-topics/ {
    rewrite ^/all-forums-all-topics/topic/([^/]+)/?$ /bb-mirror-api/v0/seo-redirect?slug=$1 last;
    rewrite ^ /hub/ permanent;
}
# /groups/<g>/forum/topic/<slug>/  and  /groups/<g>/forum/<forum>/<topic>/  → resolve.
# /groups/<g>/forum/<forum>/ (forum landing) → resolve (forum-slug branch). Else → /hub.
location ^~ /groups/ {
    rewrite ^/groups/[^/]+/forum/topic/([^/]+)/?$  /bb-mirror-api/v0/seo-redirect?slug=$1 last;
    rewrite ^/groups/[^/]+/forum/[^/]+/([^/]+)/?$  /bb-mirror-api/v0/seo-redirect?slug=$1 last;
    rewrite ^/groups/[^/]+/forum/([^/]+)/?$        /bb-mirror-api/v0/seo-redirect?slug=$1 last;
    rewrite ^ /hub/ permanent;
}
# Root-level topic-tag archives → /hub (tags aren't a 1:1 new surface).
location ^~ /topic-tag/ {
    rewrite ^ /hub/ permanent;
}

# Canonical /hub/ — the forum, rebranded "The Hub" (2026-06-01). Same web dir, FPM
# pool, gate, hard-cache. Front controller strips /hub (LG_BB_MIRROR_PUBLIC_PATH) +
# the legacy /forum //forums //forums-poc bases, so it routes any of them.
location ^~ /hub/ {
    if ($loothdev_is_authorized != 1) { return 403; }
    if ($arg_bb_native = "1") { rewrite ^ /index.php last; }

    alias /home/buck/loothplatformv2/bb-mirror/web/;

    try_files $uri /hub/index.php;

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4)$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        # 30d -> 1y (perf lane 2026-06-11): forums.css/js are ?v=<filemtime>-busted.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /hub/index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-bb-mirror.sock;
        fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/bb-mirror/web/index.php;

        # Anon microcache (zone + $lg_anon_nocache map: conf.d/lg-microcache.conf).
        # Bots/anon: 60s cache, stale-while-refresh, single render per update
        # (cache_lock). Members/gate cookies: full bypass.
        fastcgi_cache lghub;
        fastcgi_cache_key "$scheme$request_method$host$request_uri";
        fastcgi_cache_valid 200 60s;
        fastcgi_cache_bypass $lg_anon_nocache;
        fastcgi_no_cache $lg_anon_nocache;
        fastcgi_cache_use_stale updating error timeout;
        fastcgi_cache_lock on;
        # add_header here REPLACES the server-level set for this location, so
        # the security headers must be restated alongside the cache marker.
        add_header Strict-Transport-Security "max-age=15768000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-LG-Hub-Cache $upstream_cache_status always;
    }
    location ~ \.php$ { return 403; }
}

# bb-mirror API — runs on WP FPM pool (looth-dev) for $wpdb / WP context.
# _sync.php is loopback-only; auth.php is browser-callable, dev-cookie-gated.
location ^~ /bb-mirror-api/v0/ {
    alias /home/buck/loothplatformv2/bb-mirror/api/v0/;
    rewrite ^/bb-mirror-api/v0/_sync/?$ /bb-mirror-api/v0/_sync.php last;
    rewrite ^/bb-mirror-api/v0/auth/?$  /bb-mirror-api/v0/auth.php  last;
    rewrite ^/bb-mirror-api/v0/reply/?$ /bb-mirror-api/v0/reply.php last;
    rewrite ^/bb-mirror-api/v0/topic/?$ /bb-mirror-api/v0/topic.php?$args last;
    rewrite ^/bb-mirror-api/v0/seo-redirect/?$ /bb-mirror-api/v0/seo-redirect.php?$args last;
    rewrite ^/bb-mirror-api/v0/set-forum-image/?$ /bb-mirror-api/v0/set-forum-image.php last;
    rewrite ^/bb-mirror-api/v0/topic-media/?$ /bb-mirror-api/v0/topic-media.php?$args last;

    location = /bb-mirror-api/v0/_sync.php {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    location = /bb-mirror-api/v0/auth.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # seo-redirect — SEO continuity slug-resolver (cut lane 2026-06-15). PG-only,
    # bb-mirror pool. Maps an old (unique) topic slug → 301 /hub/<forum>/<slug>/;
    # forum slug → 301 /hub/<forum>/; unknown → 301 /hub/. Never 404. Gated on dev
    # for testability; the cut removes the gate so Googlebot (anon) reaches it.
    location = /bb-mirror-api/v0/seo-redirect.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-bb-mirror.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # topic — browser-callable single-topic READ fragment for the front-page
    # discussion modal. PG-only (no WP), so it runs on the bb-mirror FPM pool —
    # the SAME pool + visibility masks as the /hub single-topic page (modal==page).
    location = /bb-mirror-api/v0/topic.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-bb-mirror.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # mark-seen + unread — browser-callable, dev-cookie-gated, WP cookie reads viewer.
    # reply — browser-callable reply-WRITE, dev-cookie-gated; WP cookie = author.
    location = /bb-mirror-api/v0/reply.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    location = /bb-mirror-api/v0/mark-seen.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
    location = /bb-mirror-api/v0/unread.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # set-forum-image — browser-callable (admin), dev-cookie-gated; writes pg.
    location = /bb-mirror-api/v0/set-forum-image.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # topic-media — browser-callable, dev-cookie-gated; WP cookie = author/mod.
    # GET reads a topic's photo set; POST sets it (add/remove) for editing. Needs
    # WP + BB media functions, so the WP (looth-dev) pool like reply.php.
    location = /bb-mirror-api/v0/topic-media.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
}
