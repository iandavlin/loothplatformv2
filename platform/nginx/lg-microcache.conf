# Anonymous microcache for the /hub/ HTML (audit 2026-07-04: bots = 87% of live
# traffic, ~740k PHP renders/day). 60s TTL + serve-stale-while-updating caps
# anon rendering at ~1 PHP run per URL per minute; logged-in / gate-cookie
# holders bypass entirely (see map below). Responses with Set-Cookie are never
# cached (nginx default).
# PROVISION (per box): install as /etc/nginx/conf.d/lg-microcache.conf (symlink
# on dev2, copy on live) AND create the cache dir:
#   mkdir -p /var/cache/nginx-lghub && chown www-data:www-data /var/cache/nginx-lghub
fastcgi_cache_path /var/cache/nginx-lghub levels=1:2 keys_zone=lghub:16m max_size=256m inactive=10m;

map $http_cookie $lg_anon_nocache {
    default 0;
    ~wordpress_logged_in 1;
    ~wordpress_sec 1;
    ~looth_id 1;
    ~loothdev_auth 1;
    ~loothdev_tester 1;
}
