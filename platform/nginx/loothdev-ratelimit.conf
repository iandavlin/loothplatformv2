# Brute-force mitigation zones
limit_req_zone $binary_remote_addr zone=loothdev_thumb:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=loothdev_login:10m rate=5r/m;

# profile-app /me/* (editor) + /whoami (every page load) — DoS/scrape ceilings,
# NOT normal-use limiters. Generous bursts so real editing / fast navigation are
# never throttled; floods get capped. /whoami rate pending Lane 3 sign-off.
# (infra lane 2026-06-13)
#
# Loopback (127.0.0.1/::1) is EXEMPT: internal SSR traffic — the whoami shim and
# the gate suite's own /hub renders all call /whoami from 127.0.0.1 — would
# otherwise share ONE per-IP bucket and self-throttle the box under load (flaking
# craft-gate + forum-visibility RED). An empty limit key is "not counted" by
# nginx, so loopback is never rate-limited; external IPs are unchanged.
# (infra lane 2026-06-13)
geo $loothdev_limit_loopback {
    default      0;
    127.0.0.1/32 1;
    ::1/128      1;
}
map $loothdev_limit_loopback $loothdev_limit_key {
    0 $binary_remote_addr;
    1 "";
}
limit_req_zone $loothdev_limit_key zone=loothdev_me:10m     rate=20r/s;
limit_req_zone $loothdev_limit_key zone=loothdev_whoami:10m rate=30r/s;
