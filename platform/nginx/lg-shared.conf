# ===== lg-shared — shared header/footer partial + CSS =====
# Owned by lg-shell workstream.
# PHP includes land server-side (require_once '/srv/lg-shared/site-header.php').
# This location serves the companion CSS so browser clients can link it:
#   <link rel="stylesheet" href="/lg-shared/site-header.css">
#
# Cookie-gated same as all other static assets — the HTML that links this
# is already gated, so gating the CSS too is consistent (no bypass).
# PHP files are NOT served via HTTP — include them server-side only.
#
# Source-of-truth files live at /srv/lg-shared/.

location ^~ /lg-shared/ {
    if ($loothdev_is_authorized != 1) { return 403; }
    alias /srv/lg-shared/;
    # Allow CSS and JS only — do not serve PHP via HTTP
    location ~* \.(css|js)$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        # 1y immutable (perf lane 2026-06-11): every live consumer links these
        # with ?v=<filemtime> busting (verified: site-header.css x5 consumers,
        # social-modals.js x1; the only unversioned refs are docblock comments),
        # so deploys propagate via the URL, not revalidation.
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
    location ~ \.php$ { return 403; }
    try_files $uri =404;
}

# ----- Branded standalone error pages (Ian 2026-06-12) -----
# Static, PHP-free (must render when a pool is down). WP-template 404s are
# handled by the lg-error-pages mu-plugin; these cover nginx-level errors.
# Pages live in the repo at lg-shared/errors/ (served via the /srv symlink).
error_page 404 /lg-error/404.html;
error_page 403 /lg-error/403.html;
error_page 502 503 504 /lg-error/50x.html;
location ^~ /lg-error/ {
    alias /srv/lg-shared/errors/;
    internal;
}
