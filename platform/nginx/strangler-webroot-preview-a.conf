# === preview-a VARIANT (true-preview lane) — included ONLY by
#     sites-available/preview-a.dev2.loothgroup.com.conf, NEVER the main dev2 vhost.
#
# Static-asset handler for preview-a. SUBSUMES the vhost's generic static block:
# serve the webroot/ OVERLAY (the root-level *.js/*.css/... that deploy to the
# SHARED docroot /var/www/dev) from the preview SLOT first, then fall back to the
# shared docroot for everything else (wp-content, wp-includes, images, ...).
#
# ONE mechanism — no per-file `location = /x.js` aliases. This REPLACES the
# generic `location ~* \.(...)$` block in the preview-a vhost (same extension
# list), so there is exactly one static handler and slot overlays always win.
# Anything not in the slot overlay (the common case) falls through unchanged with
# the original 1y-immutable caching. Repo-first: platform/nginx/ in loothplatformv2.

location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|avif|woff|woff2|ttf|eot|otf|mp4|webm)$ {
    root /home/ubuntu/preview-slots/slot-a/webroot;
    try_files $uri @preview_a_docroot_static;
    add_header X-Preview-Webroot "slot-a" always;   # present ⇒ slot served this asset
    expires -1;                                      # never cache a preview overlay
    access_log off;
}

location @preview_a_docroot_static {
    root /var/www/dev;
    add_header Cache-Control "public, max-age=31536000, immutable, no-transform";
    access_log off;
    log_not_found off;
    try_files $uri =404;
}
