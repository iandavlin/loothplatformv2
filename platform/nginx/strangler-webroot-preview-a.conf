# === preview-a VARIANT (true-preview lane) — included ONLY by
#     sites-available/preview-a.dev2.loothgroup.com.conf, NEVER the main dev2 vhost.
#
# Serve the webroot/ static OVERLAY (the root-level *.js/*.css/*.json that deploy
# to the SHARED docroot /var/www/dev) from the preview SLOT first, falling back to
# the shared docroot. ONE mechanism — no per-file `location = /x.js` aliases.
#
# Scoped to ROOT-LEVEL files via `^/[^/]+\.` so it never shadows /wp-content/...,
# /wp-includes/... or app sub-asset paths (those are served by their own ^~ alias
# blocks, which take priority over this regex anyway). Anything not present in the
# slot overlay falls through to /var/www/dev unchanged.
#
# Source-of-truth: platform/nginx/ in loothplatformv2 (repo-first).

location ~ ^/[^/]+\.(js|css|json|mjs|map)$ {
    root /home/ubuntu/preview-slots/slot-a/webroot;
    try_files $uri @preview_a_webroot_fallback;
    add_header X-Preview-Webroot "slot-a" always;   # marker: confirms slot served it
    expires -1;                                       # never cache a preview asset
    access_log off;
}

location @preview_a_webroot_fallback {
    root /var/www/dev;
    try_files $uri =404;
    access_log off;
}
