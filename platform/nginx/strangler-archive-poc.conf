# archive-poc nginx snippet — paste inside the SSL server block in
# /etc/nginx/sites-available/dev.loothgroup.com.conf, ABOVE the catch-all
# `location / { ... }`.
#
# /article/<slug>/  → standalone CPT renderer (post-imgcap)
# /video/<slug>/    → standalone CPT renderer (post-type-videos)
# /sponsor/<slug>/  → standalone CPT renderer (sponsor-post)
# /archive-poc/     → SSR PHP landing (web/index.php) + static assets
# /archive-api/v0/* → JSON API (api/v0/*.php)
#   /search, /item  → archive-poc FPM pool, cookie-gated
#   /_sync          → looth-dev FPM pool (needs WP), loopback-only
#   /_materialize   → looth-dev FPM pool (needs WP), loopback-only
#
# Old /archive (Elementor) is UNTOUCHED.

    # ----- internal WP-render fallback (blob-miss) -----
    # render.php emits `X-Accel-Redirect: /__wp_render<original-permalink>` when a
    # managed-CPT post has no standalone blob (e.g. the uncovered majority of
    # videos/sponsors). nginx re-runs the WordPress front controller for the
    # original permalink so the post still renders instead of 404ing. `internal`
    # → unreachable by external clients. REQUEST_URI is rebuilt from the captured
    # path (set AFTER the fastcgi.conf include so it wins) → WP routes by permalink.
    location ~ ^/__wp_render(/.*)$ {
        internal;
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME /var/www/dev/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param REQUEST_URI     $1$is_args$args;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_read_timeout 300;
    }

    # Internal handoff target for the entitlement-gated download endpoint
    # (api/v0/download.php sends X-Accel-Redirect: /__lg_dl/<uploads-rel-path>).
    # `internal` → unreachable by external clients; nginx streams the file only
    # after download.php's tier check passes. (dev wp-uploads path; repoint at cut.)
    location ^~ /__lg_dl/ {
        internal;
        alias /var/www/dev/wp-content/uploads/;
    }

    # ----- standalone CPT article pages (layout-standalone lane) -----
    # nginx extracts the slug and passes it + a hardcoded post_type to render.php.
    # archive-poc FPM pool (peer-auth as archive-poc pg role → SELECT on article_blobs).
    location ~ ^/article/([a-z0-9][a-z0-9\-]*[a-z0-9])/?$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/standalone/render.php;
        fastcgi_param LG_POST_TYPE    post-imgcap;
        fastcgi_param LG_SLUG         $1;
        fastcgi_param QUERY_STRING    $args;
    }
    location ~ ^/video/([a-z0-9][a-z0-9\-]*[a-z0-9])/?$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/standalone/render.php;
        fastcgi_param LG_POST_TYPE    post-type-videos;
        fastcgi_param LG_SLUG         $1;
        fastcgi_param QUERY_STRING    $args;
    }
    location ~ ^/sponsor/([a-z0-9][a-z0-9\-]*[a-z0-9])/?$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/standalone/render.php;
        fastcgi_param LG_POST_TYPE    sponsor-post;
        fastcgi_param LG_SLUG         $1;
        fastcgi_param QUERY_STRING    $args;
    }

    # ----- sponsor PAGES (brand landing) — clean /sponsors/<slug>/ scheme (sponsor-pages v2).
    #       Read-only render for now; FE-edit handoff added once the CPT rewrite slug -> 'sponsors'.
    location ~ ^/sponsors/([a-z0-9][a-z0-9\-]*[a-z0-9])/?$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/standalone/render.php;
        fastcgi_param LG_POST_TYPE    sponsor-page;
        fastcgi_param LG_SLUG         $1;
        fastcgi_param QUERY_STRING    $args;
    }

    # ----- intercept WP permalinks for managed CPTs whose permalink prefix IS the
    #       post_type (catch-all, replaces 7 near-identical per-type blocks). The
    #       clean /article//video//sponsor/ aliases above (segment != post_type)
    #       and /document/ below (id-based, not slug) stay explicit. -----
    #
    # $1 = post_type, $2 = slug. To onboard a NEW CPT whose permalink prefix is its
    # post_type, add ONE word to the alternation below — no new block needed.
    # render.php falls back to WP via /__wp_render on blob-miss, so uncovered posts
    # serve the WP page instead of 404 (and log the miss for visibility).
    #
    # The type list is EXPLICIT on purpose: a wide-open `^/([\w-]+)/([\w-]+)/?$`
    # would shadow extensionless two-segment WP core paths (e.g. the cookie-gate-
    # exempt /wp-json/lg-member-sync REST endpoint), since a regex location beats
    # the `location /` prefix that WP falls through to. Keep this anchored.
    location ~ ^/(post-imgcap|post-type-videos|sponsor-post|loothprint|loothcuts|useful_links|member-benefit|shorty|event)/([a-z0-9][a-z0-9_\-]*[a-z0-9])/?$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        # FE-edit handoff: ?lg_edit=1 goes to WordPress (the real plugin editor +
        # capability check); WP resolves this same permalink from REQUEST_URI. All
        # other requests render standalone. Read-only views never touch WP.
        if ($arg_lg_edit)     { rewrite ^ /index.php last; }   # FE-edit -> WP
        if ($arg_lg_comments) { rewrite ^ /index.php last; }   # comments view -> WP
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/standalone/render.php;
        fastcgi_param LG_POST_TYPE    $1;
        fastcgi_param LG_SLUG         $2;
        fastcgi_param QUERY_STRING    $args;
    }
    # document permalink is id-based (/document/<id>/) — pass LG_POST_ID, not slug.
    location ~ ^/document/([0-9]+)/?$ {
        if ($loothdev_is_authorized != 1) { return 403; }
        if ($arg_lg_edit)     { rewrite ^ /index.php last; }   # FE-edit -> WP
        if ($arg_lg_comments) { rewrite ^ /index.php last; }   # comments view -> WP
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/standalone/render.php;
        fastcgi_param LG_POST_TYPE    document;
        fastcgi_param LG_POST_ID      $1;
        fastcgi_param QUERY_STRING    $args;
    }

    # ----- canonical front feed + archive (clean URLs, §0d) -----
    # /front-page/ -> discovery feed (index.php); /archive/ -> search/grid (search.php).
    location = /front-page/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/index.php;
        fastcgi_param QUERY_STRING $args;
    }
    # HOME PAGE = the archive-poc front feed (Ian 2026-06-14: "front page = home page").
    # Served at bare / directly — no redirect (was: main-conf `location = /` -> 302 /hub/).
    # /front-page/ above stays as an explicit alias. Same FPM pool/script/gate.
    location = / {
        # FluentCRM click-tracking links (/?ns_url=...&mid=...) must reach WP's
        # redirect handler, not the archive front. Every link in every sent member
        # email is wrapped in this form; without this escape they ALL land on the
        # front feed (silently broken since the 6/20 cut - found 2026-07-06).
        if ($arg_ns_url) { rewrite ^ /index.php last; }
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/index.php;
        fastcgi_param QUERY_STRING $args;
    }
    # /stream/ RETIRED 2026-06-05 — the Hub absorbs the unified feed. Redirect to /hub/.
    location = /stream/ { return 301 /hub/; }
    location = /stream { return 301 /hub/; }
    location = /archive/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/search.php;
        fastcgi_param QUERY_STRING $args;
    }
    location = /archive { return 301 /archive/; }

    # ----- SEO continuity: retired-CPT / changed-permalink redirects (cut lane 2026-06-15) -----
    # /mobile-archive-page/<n>/ — fully retired WP CPT (8 indexed URLs, pure 404) → the archive.
    location ^~ /mobile-archive-page/ { return 301 /archive/; }
    # /sponsor-page/<slug>/ — old permalink; the page now serves at /sponsors/<slug>/. Permanent.
    location ~ "^/sponsor-page/([a-z0-9][a-z0-9_\-]*[a-z0-9])/?$" { return 301 /sponsors/$1/; }

    # ----- standalone content pages (no WP boot; archive-poc FPM pool) -----
    # /sponsors/ (sponsor-page CPT listing), /calendar/ (single-column events),
    # /about/ + /contact/ (placeholder shells). Each wears the shared header.
    location = /sponsors/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/sponsors.php;
        fastcgi_param QUERY_STRING $args;
    }
    location = /calendar/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/calendar.php;
        fastcgi_param QUERY_STRING $args;
    }
    # /local/ + /local/<slug>/ — Local Looths chapter pages (Bento build, 2026-07-22).
    # Replaces the retired BuddyPress /groups/<slug>/ destinations (which 301 to /hub/
    # with zero context). local.php parses the slug from REQUEST_URI, sitemap-style.
    location ~ "^/local(?:/[a-z0-9][a-z0-9\-]*[a-z0-9])?/?$" {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/local.php;
        fastcgi_param QUERY_STRING $args;
    }
    location = /about/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/about.php;
        fastcgi_param QUERY_STRING $args;
    }
    location = /contact/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/contact.php;
        fastcgi_param QUERY_STRING $args;
    }

    # ----- SEO sitemap (cut lane 2026-06-15) -----
    # UNGATED on purpose, exactly like /robots.txt (gate-exempt): Googlebot is
    # anonymous and must reach it at the cut. Lists only already-public data
    # (public/lite content paths + public profile slugs) — nothing to leak.
    # sitemap.php parses the section from REQUEST_URI; index at /sitemap.xml.
    location = /sitemap.xml {
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/sitemap.php;
    }
    location ~ "^/sitemap-(static|content|profiles)\.xml$" {
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME /srv/archive-poc/web/sitemap.php;
    }

    # ----- archive-poc frontend (SSR + static) -----
    location ^~ /archive-poc/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        alias /srv/archive-poc/web/;
        index index.php;
        try_files $uri $uri/ /archive-poc/index.php?$args;

        # Static assets (reactions PNGs, hashed asset bundles) had NO cache
        # headers — Lighthouse flagged them (perf lane 2026-06-11). 30d public,
        # no immutable: reaction images are referenced WITHOUT a version query.
        location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4)$ {
            if ($loothdev_is_authorized != 1) { return 403; }
            add_header Cache-Control "public, max-age=2592000" always;
            try_files $uri =404;
        }

        # Only index.php executes; deny any other .php in the static tree.
        location = /archive-poc/index.php {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
        location ~ \.php$ { return 403; }
    }

    # ----- archive-poc API -----
    location ^~ /archive-api/v0/ {
        alias /srv/archive-poc/api/v0/;

        # Clean URLs → underlying .php files
        rewrite ^/archive-api/v0/search/?$        /archive-api/v0/search.php  last;
        rewrite ^/archive-api/v0/item/?$          /archive-api/v0/item.php    last;
        rewrite ^/archive-api/v0/item/([0-9]+)/?$ /archive-api/v0/item.php?id=$1 last;
        rewrite ^/archive-api/v0/_sync/?$         /archive-api/v0/_sync.php   last;
        rewrite ^/archive-api/v0/_materialize/?$  /archive-api/v0/_materialize.php last;
        rewrite ^/archive-api/v0/rows-more/?$     /archive-api/v0/rows-more.php last;
        rewrite ^/archive-api/v0/like/?$          /archive-api/v0/like.php    last;
        rewrite ^/archive-api/v0/download/?$      /archive-api/v0/download.php last;
        rewrite ^/archive-api/v0/comments/?$      /archive-api/v0/comments.php last;
        rewrite ^/archive-api/v0/comment-post/?$  /archive-api/v0/comment-post.php last;
        rewrite ^/archive-api/v0/comment-react/?$ /archive-api/v0/comment-react.php last;
        rewrite ^/archive-api/v0/comment-delete/?$ /archive-api/v0/comment-delete.php last;
        rewrite ^/archive-api/v0/comment-edit/?$   /archive-api/v0/comment-edit.php last;
        rewrite ^/archive-api/v0/card-react/?$    /archive-api/v0/card-react.php last;
        rewrite ^/archive-api/v0/save-post/?$     /archive-api/v0/save-post.php last;
        rewrite ^/archive-api/v0/my-saved/?$      /archive-api/v0/my-saved.php last;
        rewrite ^/archive-api/v0/search-suggest/?$ /archive-api/v0/search-suggest.php last;
        rewrite ^/archive-api/v0/guitardle-score/?$ /archive-api/v0/guitardle-score.php last;
        rewrite ^/archive-api/v0/guitardle-board/?$ /archive-api/v0/guitardle-board.php last;

        # Loopback-only single-post reindex endpoint — looth-dev pool (WP).
        location = /archive-api/v0/_sync.php {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            # alias-safe: plain fastcgi.conf (no try_files) + absolute SCRIPT_FILENAME.
            # $request_filename + try_files mis-resolve under the parent alias -> 502.
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/_sync.php;
        }

        # Loopback-only single-post blob materialize endpoint — looth-dev pool
        # (needs WP to resolve PostContext + peer-auth to write discovery.article_blobs).
        location = /archive-api/v0/_materialize.php {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            # alias-safe: plain fastcgi.conf (no try_files) + absolute SCRIPT_FILENAME.
            # $request_filename + try_files mis-resolve under the parent alias -> 502.
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/_materialize.php;
        }

        # Comment compose gate + WRITE — looth-dev pool (boots WP). The posting
        # gate is the WP login cookie (an unbridged member is anon to /whoami but
        # has a valid WP cookie), so this can't live on the whoami-gated read pool.
        # GET → auth state + nonce; POST → insert into discovery.comments. Browser-
        # reachable (NOT loopback), still behind the dev cookie gate. Exact-match
        # location beats the read regex below.
        location = /archive-api/v0/comment-post.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            # alias-safe: plain fastcgi.conf + absolute SCRIPT_FILENAME (matches _sync).
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/comment-post.php;
        }

        # Comment reaction WRITE — looth-dev pool (boots WP), same WP-cookie gate
        # + nonce as comment-post (so unbridged members can react). POST only.
        location = /archive-api/v0/comment-react.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/comment-react.php;
        }

        # Comment soft-delete / restore WRITE — looth-dev pool (boots WP), same
        # WP-cookie gate + nonce. POST {comment_id,_wpnonce,restore?}; authz =
        # comment author OR moderate_comments. Flips discovery.comments.status.
        location = /archive-api/v0/comment-delete.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/comment-delete.php;
        }

        # Comment body EDIT WRITE — looth-dev pool (boots WP), same WP-cookie gate
        # + nonce. POST {comment_id,body,_wpnonce}; authz = author OR moderate_comments.
        # Updates discovery.comments.body + stamps edited_at.
        location = /archive-api/v0/comment-edit.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/comment-edit.php;
        }

        # Card reaction WRITE+GET — looth-dev pool (boots WP), same WP-cookie gate
        # + nonce as comment-react (reactions on feed cards; 'like' folds in here).
        # GET -> nonce + my_reactions; POST -> toggle card_reactions. Browser-reachable.
        location = /archive-api/v0/card-react.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/card-react.php;
        }

        location = /archive-api/v0/save-post.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/save-post.php;
        }

        # Guitardle daily-result WRITE+GET — looth-dev pool (boots WP), same
        # WP-cookie gate + nonce as card-react (members-only score recording;
        # the leaderboard UI comes later). GET -> auth state + nonce + today's
        # result; POST -> insert into discovery.guitardle_results.
        location = /archive-api/v0/guitardle-score.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/guitardle-score.php;
        }

        location = /archive-api/v0/my-saved.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            include fastcgi.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/my-saved.php;
        }

        # Public read-only endpoints — archive-poc FPM pool, cookie-gated.
        # like = the net-new like toggle
        # (POST); it additionally requires /whoami auth + an HMAC CSRF token at
        # the PHP layer (see like.php), so the cookie gate alone never authorizes
        # a write.
        location ~ ^/archive-api/v0/(search|search-suggest|item|rows-more|like|download|comments|guitardle-board)\.php$ {
            if ($loothdev_is_authorized != 1) { return 403; }
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }
