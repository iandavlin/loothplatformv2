# === MAIN VHOST — REPO SOURCE-OF-TRUTH (platform/nginx/dev2.loothgroup.com.conf) ===
# Deployed box-local as /etc/nginx/sites-available/dev2.loothgroup.com.conf.
# SECRETS are NOT in this file: the two dev gate tokens are `include`d from the
# box-local /etc/nginx/snippets/loothdev-tokens.conf (see *.example). TLS cert paths
# (ssl_certificate*) and the dev cookie domain in /claim are box/cutover-managed and
# are the only env-specific literals remaining; everything else is identical per box.
server {
    listen 80;
    listen [::]:80;
    server_name buck-dev2.loothgroup.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location ^~ /.well-known/ { root /var/www/dev; try_files $uri =404; access_log off; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name buck-dev2.loothgroup.com;
    location = /gatetest { default_type text/plain; return 200 "auth=$loothdev_is_authorized dev_ok=$loothdev_dev_ok tester_ok=$loothdev_tester_ok\n"; }
    ssl_certificate     /etc/letsencrypt/live/buck-dev2.loothgroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buck-dev2.loothgroup.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # Security headers (pre-go-live hardening, Buck F4 2026-06-11). HSTS w/o preload
    # (reversible); no includeSubDomains (no sub-subdomains served here over HTTP).
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    root /var/www/dev;
    include /etc/nginx/snippets/lg-write-freeze.conf;
    index index.php index.html;

    client_max_body_size 8000M;
    client_body_timeout 6000s;
    send_timeout 6000s;

    # Smart heartbeat — visible-tab mousemove/click/keydown only.
    # Mtime-bumps /var/log/nginx/heartbeat.log which the idle daemon watches.
    sub_filter '</head>' '<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#87986a"><script>(function(){try{var b=JSON.parse(localStorage.getItem("lg-set-boot")||"null");var r=document.documentElement,h=document.head||r;if(b){var v=b.vars||{},k;for(k in v)if(v.hasOwnProperty(k))r.style.setProperty(k,v[k]);if(b.theme)r.setAttribute("data-lguser-theme",b.theme);r.setAttribute("data-lguser-dark",b.dark?"1":"0");if(b.feed)r.setAttribute("data-lguser-feed",b.feed);if(b.font){r.style.setProperty("--lg-font-sans",b.font);r.style.setProperty("--lguser-font",b.font);}if(b.scale)r.style.fontSize=(b.scale*100)+"%";if(b.bubble)r.style.setProperty("--lguser-bubble",b.bubble);if(b.fontHref&&!document.getElementById("lg-boot-font")){var l=document.createElement("link");l.id="lg-boot-font";l.rel="stylesheet";l.href=b.fontHref;h.appendChild(l);}if(b.dark){var bg=b.bg||"#15171a",s=document.createElement("style");s.id="lg-boot-crit";s.textContent="html{background:"+bg+";color-scheme:dark}body{background:"+bg+"!important;color:"+(b.ink||"#e5e7e1")+"!important}.feed-page,.feed,main,.bb-layout,.bb-layout__main{background:"+bg+"!important}#site-header,.lg-chrome{background:#000!important}";h.appendChild(s);}}var hl=localStorage.getItem("lg-hub-layout");if(hl==="cards"||hl==="compact")hl="masonry";if(hl)r.setAttribute("data-lg-hublayout",hl);if(/^\/hub/.test(location.pathname)){r.className+=" lg-feed-booting";setTimeout(function(){r.classList.remove("lg-feed-booting");},1500);}}catch(e){}})();</script><style id="lg-smoothnav">html.lg-feed-booting .feed-page .feed{opacity:0}.feed-page .feed{transition:opacity .15s ease}</style><script src="/pwa.js?v=4" defer></script><script>(function(){var t=0;function hb(){if(document.visibilityState==="hidden")return;var n=Date.now();if(n-t<30000)return;t=n;navigator.sendBeacon("/__heartbeat")}["mousemove","click","keydown"].forEach(function(e){document.addEventListener(e,hb,{passive:true})});hb()}())</script><script async src="https://www.googletagmanager.com/gtag/js?id=G-LL56F0GWCH"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-LL56F0GWCH");</script></head>';
    sub_filter_once on;
    sub_filter_types text/html;

    location = /__heartbeat {
        access_log /var/log/nginx/heartbeat.log;
        return 204;
    }

    # PWA service worker must not be pinned by the static catch-all's
    # expires max, or browsers never pick up SW updates.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        root /home/buck/loothplatformv2/webroot;
        try_files $uri @preview_a_docroot_static;
        add_header X-Preview-Webroot "slot-a" always;
    }

    # PWA install: Chrome fetches the manifest + icons WITHOUT credentials,
    # so they must bypass the cookie gate or the install prompt never fires.
    # Public assets (app name + generic icons) — no secrets.
    location = /manifest.json {
        # Sandbox identity override (Buck 2026-07-22): the install must be named
        # "Looth Sandbox", not the repo manifest name — falls back to the clone
        # slot / docroot if the override file is ever removed.
        root /home/buck/pwa-overrides;
        try_files $uri @preview_a_docroot_static;
        add_header X-Preview-Webroot "slot-a" always;
    }
    # Icons are unversioned URLs — 30d cache (no immutable), perf lane 2026-06-11.
    location ^~ /icons/ {
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # PWA bootstrap + JSON feeds must REVALIDATE. The static catch-all below sets
    # expires max on all .js/.json; /pwa.js has no version query, so without this
    # clients pin a stale bootstrap for 10y and never pick up Hub polish updates.
    location = /pwa.js {
        add_header Cache-Control "no-cache";
        root /home/buck/loothplatformv2/webroot;
        try_files $uri @preview_a_docroot_static;
        add_header X-Preview-Webroot "slot-a" always;
    }
    location = /shop-feed.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }


    # ----- Cookie gate -----
    # The dev gate tokens (one-time /claim secret + tester secret) are BOX-LOCAL
    # secrets and are NOT committed to the repo. They live in the root-owned, per-box
    # file /etc/nginx/snippets/loothdev-tokens.conf, which `set`s $loothdev_token and
    # $loothdev_tester_token. See platform/nginx/loothdev-tokens.conf.example for the
    # shape. Devs visit /claim?t=TOKEN once per device → 1-year cookie; bots → 403.
    include /etc/nginx/snippets/loothdev-tokens.conf;
    # [box-managed 2026-07-04] dev2 gate re-armed; repo vhost stays gate-free for live
    if ($loothdev_is_authorized = 0) { return 403; }

    location = /claim {
        access_log off;
        if ($arg_t = $loothdev_token) {
            add_header Set-Cookie "loothdev_auth=$loothdev_token; Domain=buck-dev2.loothgroup.com; Path=/; Max-Age=31536000; HttpOnly; Secure; SameSite=Lax" always;
            add_header Content-Type "text/plain";
            return 200 "Access granted. This device is now claimed for 1 year. Visit https://dev.loothgroup.com/";
        }
        return 200 "Claim endpoint. Use the URL from Ian.";
    }

    # Tester claim: short-lived (7 day) tester cookie. ?next=<path> redirects post-claim.
    # Separate cookie name (loothdev_tester) so dev cookies are never overwritten.
    location = /claim-tester {
        access_log off;
        if ($arg_t = $loothdev_tester_token) {
            add_header Set-Cookie "loothdev_tester=$loothdev_tester_token; Domain=buck-dev2.loothgroup.com; Path=/; Max-Age=604800; HttpOnly; Secure; SameSite=Lax" always;
            return 302 $loothdev_tester_next;
        }
        add_header Content-Type "text/plain";
        return 200 "Tester claim endpoint. Use the link from the dev-control plugin.";
    }

    # Mailpit — local SMTP catcher web UI (cookie-gated like the other dev tools)
    location ^~ /mailpit/ {
        # GATE OFF for cut 2026-06-20: if ($cookie_loothdev_auth != $loothdev_token) { return 403; }
        proxy_pass http://127.0.0.1:8025;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 86400s;
    }

    # ----- Exempt paths (no cookie required) -----

    # Stripe billing app + its API endpoints (own X-LGMS-Token + Stripe signature auth)
    location ^~ /billing {
        alias /srv/lg-stripe-billing/public;
        try_files $uri $uri/ @billing_rewrite;

        location ~ ^/billing/.*\.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-lg-billing-dev.sock;
            fastcgi_read_timeout 60;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }

    location @billing_rewrite {
        rewrite ^/billing/?(.*)$ /billing/index.php?/$1 last;
    }

    # WP↔billing server-to-server callbacks (shared-secret authed)
    # Direct FastCGI pass — skip fastcgi-php.conf snippet because it has a
    # try_files $fastcgi_script_name =404 check that fails for non-.php URIs.
    # We pass to WP's index.php directly and let WP route via REQUEST_URI.
    location ^~ /wp-json/lg-member-sync/ {
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME /var/www/dev/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_read_timeout 300;
    }

    location ^~ /wp-json/loothdev/ {
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME /var/www/dev/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_read_timeout 300;
    }

    # Internal service channel (poller <-> profile-app, shared-secret auth at PHP layer).
    location ^~ /wp-json/looth-internal/ {
        # Lockdown (Ian 2026-06-03): internal tier channel — localhost only.
        # whoami shim calls via https://127.0.0.1; defense-in-depth atop PHP shared-secret.
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME /var/www/dev/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_read_timeout 300;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # Thumbnail editor — has its own basic auth + rate limit on brute force
    location ^~ /thumb/ {
        alias /srv/thumb-app/;
        index editor.html index.php;
        client_max_body_size 60M;

        # Rate limit: 5 requests/minute per IP, allow short bursts of 10
        # Legit users opening the editor hit ~5-20 requests in burst then idle
        # Brute force pounding gets 503'd after burst exhausted
        limit_req zone=loothdev_thumb burst=10 nodelay;
        limit_req_status 429;

        auth_basic           "Thumbnail Editor";
        auth_basic_user_file /srv/thumb-app/.htpasswd;
        location ~ ^/thumb/\. { deny all; return 404; }

        location ~ ^/thumb/(assets|patterns|output)/.*\.php$ {
            return 403;
        }

        location ~ ^/thumb/api/(.*)$ {
            rewrite ^/thumb/api/(.*)$ /thumb/api.php?path=$1 last;
        }

        location ~ ^/thumb/.+\.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
            fastcgi_read_timeout 300;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param REMOTE_USER $remote_user;
        }
    }

    # Static assets (only useful WITH cookie since the HTML linking them is gated)
    # 1y immutable: HTML-linked assets carry ?v=<filemtime>; overlay JS is loaded
    # by pwa.js (no-cache) with explicit ?v=N counters. webp/avif added 2026-06-11.
    # pwa.js-injected overlays carry a HARDCODED ?v (no filemtime auto-bust), so
    # immutable cached them a year. Serve no-cache so the browser revalidates
    # (cheap 304). Must precede the catch-all immutable block. (overlay-nocache)
    location ~* ^/(app-mobile-fixes|app-settings|bottom-nav|directory-desktop|directory-mobile|events-live|events-mobile|gdle-side-art|guitardle-teaser|hub-infinite|hub-nojump|hub-polish|loothalong|messenger-sheet|mobile-hub|practice-sheet|profile-sheet|push|sponsor-cards|sponsor-sheet)\.js$ {
        root /home/buck/loothplatformv2/webroot;
        try_files $uri @preview_a_docroot_static;
        add_header X-Preview-Webroot "slot-a" always;
        add_header Cache-Control "no-cache";
        access_log off;
        log_not_found off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|avif|woff|woff2|ttf|eot|otf|mp4|webm)$ {
        root /home/buck/loothplatformv2/webroot;
        try_files $uri @preview_a_docroot_static;
        add_header X-Preview-Webroot "slot-a" always;
        add_header Cache-Control "public, max-age=31536000, immutable, no-transform";
        access_log off;
        log_not_found off;
    }

    # /.well-known/ must serve ANONYMOUSLY over 443 (documented gate-exempt path;
    # only the :80 block had it). Android Digital Asset Links (assetlinks.json)
    # verifies the TWA APK with an anonymous fetch (Buck 2026-06-11).
    location ^~ /.well-known/ { root /var/www/dev; try_files $uri =404; access_log off; }

    # Always-deny patterns
    location ~ /\.(?!well-known/) { deny all; }
    location ~* wp-config[^/]*\.php$ { deny all; }   # also wp-config(1).php etc (Buck F5)
    location = /xmlrpc.php { deny all; }   # F3: pingback/multicall amplification
    # Backup/editor cruft must never serve — .bak/.save/.old/.orig/.swp and
    # suffixed variants (.bak-*, .bak.<ts>) incl. wp-config.php.bak* w/ live
    # creds (Buck launch-blocker 2026-06-11). 224 such files sat raw in docroot.
    location ~* \.(bak|save|old|orig|swp|swo|tmp)([.\-][\w.\-]*)?$ { deny all; }

    # ----- lg-layout-v2 mockups + harness outputs (static, gated) -----
    # Browse architecture mockups + test snapshots from a real browser:
    #   https://dev.loothgroup.com/v2/mockup/render-pipeline.html
    #   https://dev.loothgroup.com/v2/mockup/editor-pipeline.html
    #   https://dev.loothgroup.com/v2/docs/README.md   (raw markdown)
    location ^~ /v2/ {
        alias /srv/lg-layout-v2/;
        # autoindex OFF (infra lane 2026-06-13): directory listing exposed the
        # whole lg-layout-v2 source tree. Explicit mockup/doc files still serve
        # by path (see URLs above); the tree no longer enumerates itself.
        autoindex off;
        default_type text/plain;
        types {
            text/html  html htm;
            text/css   css;
            application/javascript js;
            application/json json;
            image/png  png;
            image/jpeg jpg jpeg;
            image/svg+xml svg;
        }
        # Source must never be served — PHP here was being returned as readable
        # plaintext (source disclosure). Deny outright (infra lane 2026-06-13).
        location ~ \.php$ { return 403; }
    }

    # ----- Chrome DevTools remote-debug proxy — REMOVED from the prod-bound conf -----
    # The Chrome remote-debug proxy was removed (infra lane 2026-06-13): it exposed
    # Chrome's debug surface behind only the shared dev cookie, and dev is promoted
    # in-place to live. Automation (craft-gate, chrome-dev-login) connects to the
    # local debug port DIRECTLY and is unaffected; humans wanting browser DevTools
    # should SSH-tunnel the port. A craft gate keeps the proxy route + debug port
    # absent from this conf.

    # ----- Gated locations (everything else) -----
    # ----- Strangler apps (extracted to includes 2026-05-27) -----
    # Each strangler owns its own snippet under /etc/nginx/snippets/.
    # Source-of-truth copies live in each project's repo as nginx-snippet.conf.
    # Order matters where prefixes overlap; all three currently disjoint.
    # The catch-all `location /` below this is the WP fallback.
    include /etc/nginx/snippets/strangler-profile-app-buck.conf;
    include /etc/nginx/snippets/strangler-archive-poc-buck.conf;
    include /etc/nginx/snippets/strangler-bb-mirror-buck.conf;
    include /etc/nginx/snippets/strangler-events-buck.conf;
    include /etc/nginx/snippets/strangler-membership-buck.conf;
    include /etc/nginx/snippets/lg-shared-buck.conf;
    include /etc/nginx/snippets/strangler-webroot-buck.conf;

    # location = / is now defined in strangler-archive-poc.conf (serves the archive-poc front feed).
    # Changed 2026-06-14 (Ian: "front page = home page"). Was: return 302 /hub/;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-looth-dev.sock;
        fastcgi_read_timeout 300;
    }

    access_log /var/log/nginx/dev.loothgroup.access.log;
    error_log  /var/log/nginx/dev.loothgroup.error.log;
}
