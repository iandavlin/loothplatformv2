# lg-write-freeze — member write-freeze + maintenance modal for deploys.
#   ON:  touch /etc/nginx/lg-write-freeze.flag     OFF: rm it.   (no reload — -f is per-request)
# When ON: member writes return a clean 503 (backstop) and every page injects lg-maint.js,
# which pops a "we'll be right back" modal and catches write-503s. Reads stay up; internal exempt.
set $lg_freeze 0;
set $lg_maint_js "";
if (-f /etc/nginx/lg-write-freeze.flag) { set $lg_freeze 1; set $lg_maint_js "<script src=\"/lg-maint.js?v=1\" defer></script>"; }
set $lg_block "$lg_freeze$lg_write_target";
if ($lg_block = "11") { return 503; }
error_page 503 = @lg_503;
location @lg_503 { internal; return 503; }
sub_filter "</body>" "${lg_maint_js}</body>";
location = /lg-maint.js { default_type application/javascript; alias /srv/lg-shared/lg-maint.js; }
