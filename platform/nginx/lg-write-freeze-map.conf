# lg-write-freeze map — http context (include via conf.d).
# $lg_write_target = 1 when the request is a member WRITE we gate during a deploy.
# Internal/system endpoints are exempt so deploy + auth keep working.
map "$request_method:$request_uri" $lg_write_target {
    default 0;
    "~*^(POST|PUT|PATCH|DELETE):/archive-api/v0/_(sync|materialize)"      0;
    "~*^(POST|PUT|PATCH|DELETE):/bb-mirror-api/v0/(_sync|auth)"           0;
    "~*^(POST|PUT|PATCH|DELETE):/profile-api/v0/(internal/|user-created)" 0;
    "~*^(POST|PUT|PATCH|DELETE):/archive-api/v0/"     1;
    "~*^(POST|PUT|PATCH|DELETE):/bb-mirror-api/v0/"    1;
    "~*^(POST|PUT|PATCH|DELETE):/profile-api/v0/"      1;
    "~*^(POST|PUT|PATCH|DELETE):/wp-json/buddyboss/"   1;
    "~*^[A-Z]+:/patreon-(connect|callback|password)"   1;
}
