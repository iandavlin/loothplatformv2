location = /profile-api/v0/user-created.php {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    location = /profile-api/v0/internal-email-changed.php {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Schema is public — still behind the dev cookie gate (whole site is).
    location = /profile-api/v0/schema.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Public read (auth-aware via JWT cookie).
    location = /profile-api/v0/user.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Authed /me endpoints — dev cookie gate (perimeter) + JWT auth in PHP (real
    # auth, via the looth_id cookie or an Authorization: Bearer token). The
    # bearer-PRESENCE shortcut that used to bypass the dev cookie gate was removed
    # (infra lane 2026-06-13): ANY "Bearer " header — even junk — opened the whole
    # /me surface past the perimeter. PHP validates the JWT either way; the cookie
    # gate is enforced like every other block. Per-IP rate limit blunts
    # credential-stuffing / scraping floods.
    location ~ "^/profile-api/v0/(me|me-header|me-about|me-location|me-socials|me-preview|me-claim|me-section-order|me-name|me-instruments|me-skills|me-scenes|me-highlights|me-credentials|me-location-search|me-practices|me-craft|me-gallery|me-connect|me-layout|me-catalog|me-lights|me-practice-header|me-practice-about|me-practice-layout|me-practice-block|me-practice-services|me-practice-instruments|me-avatar|me-connections|me-messages|me-thread|me-thread-members|me-thread-entry|me-message-image|me-social-counts|me-notifications|me-mutes|me-banner|me-resume|me-freeform|me-dropoffs|me-discussion-visibility)\.php$" {
        if ($loothdev_is_authorized != 1) { return 403; }
        limit_req zone=loothdev_me burst=80 nodelay;
        limit_req_status 429;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # /whoami — hit on every consumer page load (high frequency). Dedicated
    # exact-match location (wins over the regex block below) so its generous
    # per-IP rate limit doesn't also throttle catalogs/directory pagination.
    # The rate is a generous DoS ceiling, NOT a normal-use limiter; final tuning
    # is pending Lane 3 (profile-app) sign-off for shared-NAT call volume.
    location = /profile-api/v0/whoami.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        limit_req zone=loothdev_whoami burst=120 nodelay;
        limit_req_status 429;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Public/auth-aware endpoints. (whoami handled by the exact-match block above.)
    # chapter* (dmv-native): public READ + auth-gated WRITE, enforced in PHP by
    # Auth::requireUser() — chapters are public and browsable, so they must NOT sit in the
    # /me allowlist above, which 403s anonymous at the edge. Without this entry the catch-all
    # `location ~ \.php$ { return 403; }` below silently kills every chapter endpoint.
    location ~ "^/profile-api/v0/(catalogs|directory-members|directory-pins-public|reports|practice|users|sponsor|chapter|chapter-join|chapter-members|chapter-posts|chapter-comments)\.php$" {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    location ~ \.php$ { return 403; }
}

