# Owns: /profile/edit, /u/<slug>, /u/<slug>/edit, /p/<slug>,
#       /profile-api/v0/*, /directory/members, /members/* hijack redirects.
# Source: /home/buck/loothplatformv2/profile-app/
# FPM pool: php8.3-fpm-profile-app.sock
# Authoritative scope: /home/ubuntu/projects/docs/STRANGLER-COORDINATION.md


# /profile/edit (and /profile/edit/) → SSR editor (web/edit.php)
location ^~ /profile/edit {
    if ($loothdev_is_authorized != 1) { return 403; }
    alias /home/buck/loothplatformv2/profile-app/web/;
    rewrite ^/profile/edit/?$ /profile/edit/edit.php last;

    location = /profile/edit/edit.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/profile-app/web/edit.php;
    }

    # Static assets under /profile/edit/<file>.{css,js,…}
    location ~ ^/profile/edit/([\w\-.]+\.(css|js|svg|png|jpg))$ {
        alias /home/buck/loothplatformv2/profile-app/web/$1;
    }

    location ~ \.php$ { return 403; }
}

# /g/<slug> — the CHAPTER page (dmv-native lane). Native: no BuddyBoss, no WordPress.
#
# /g/ was previously unclaimed and therefore fell through to the WordPress catch-all, which
# 404s it. Same fastcgi.conf form as /u/ below (NOT snippets/fastcgi-php.conf) so the
# try_files-against-document_root check does not 404 an extensionless URI.
#
# `/g/` (chosen over `/chapters/<slug>` and `/hub/?chapter=`): short, shareable, and it reads
# as a PLACE. A query string reads as a filter, and a chapter is a room with a door, not a
# facet. It also matches the URL the groups-design lane mocked, so Ian has already seen it.
location ~ "^/g/([\w\-]+)/?$" {
    if ($loothdev_is_authorized != 1) { return 403; }
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
    fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/profile-app/web/g.php;
    fastcgi_param QUERY_STRING    slug=$1&$args;
}

