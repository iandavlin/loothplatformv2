# BB legacy-surface hijack: the canonical profile is /u/<slug>. NO /members/*
# path may render legacy BuddyBoss chrome — redirect every one into profile-app.
# (Was profile-only; widened 2026-06-14 because the shared header's messages/
# notifications icons link to /members/me/* and the bare /members/ directory is
# still BB — both reachable from any page, e.g. Events. On dev these 404 with BB
# components off; on dev2 BB renders them, so the redirect lands dev + dev2 + cut.)
# Order matters — nginx regex locations match top-to-bottom, first match wins.
#
# /members/me/*  = BB "current user" shortcuts the shared header emits
#   (envelope -> /members/me/messages/, bell -> /members/me/notifications/).
#   "me" can't resolve to a slug here (/u/me renders blank), so send the viewer
#   to their own editable profile. PROPER fix is lg-shell wiring those icons to
#   the header modals; this is the routing stopgap.
location ~ "^/members/me(/.*)?$" {
    return 302 /profile/edit;
}
# /members/<slug>/profile/edit[/...]  -> profile-app editor
location ~ "^/members/([\w\-]+)/profile/edit(/.*)?$" {
    return 302 /profile/edit;
}
# Any other /members/<slug>[/...] (profile, activity, connections, photos, …)
#   -> that member's canonical public profile.
#   301 (SEO continuity, cut lane 2026-06-15): old BB member URLs are indexed;
#   302 would keep Google on /members/<slug> and transfer no equity. Permanent.
location ~ "^/members/([\w\-]+)(/.*)?$" {
    return 301 /u/$1;
}
# Bare /members/ BB member directory -> canonical profile-app directory.
# (exact-match locations outrank the regexes above regardless of order.)
# 301 for the same SEO-continuity reason as above.
location = /members/ { return 301 /directory/members; }
location = /members  { return 301 /directory/members; }

# Internal service channel (poller <-> profile-app, shared-secret auth at PHP layer).
# Must be ABOVE the main /profile-api/v0/ block so the more-specific ^~ wins.
    # ----- profile-app media store: AUTH front controller (Ian 6/12) -----
    # Decision in PHP (Visibility::fileVisible — avatars/banners public,
    # gallery/resumes per the owner's visibility + master switch), bytes
    # served by nginx via X-Accel-Redirect to the internal alias below.
    location ^~ /profile-media/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        rewrite ^/profile-media/(.*)$ /profile-media-auth?path=$1 last;
    }
    location = /profile-media-auth {
        internal;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/profile-app/web/media.php;
    }
    location ^~ /profile-media-internal/ {
        internal;
        alias /srv/profile-app-media/;
    }

    # ----- DM image attachments: ACCESS-CONTROLLED proxy (message-images lane) -----
    # DMs are PRIVATE — served ONLY to thread participants; web/message-media.php answers
    # 404 on any miss. Bytes come from the DEDICATED message R2 bucket or the local fallback.
    location ^~ /message-media/ {
        if ($loothdev_is_authorized != 1) { return 403; }
        rewrite ^/message-media/(.*)$ /message-media-auth?path=$1 last;
    }
    location = /message-media-auth {
        internal;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/profile-app/web/message-media.php;
    }
    location ^~ /message-media-internal/ {
        internal;
        alias /srv/profile-app-message-media/;
    }

location ^~ /profile-api/v0/internal/ {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    # No cookie gate — internal only, X-LG-Internal-Auth verified in PHP
    # via hash_equals() against /etc/lg-internal-secret.
    # Route everything under /internal/ to the single PHP handler via explicit
    # SCRIPT_FILENAME — keeps things simple, no try_files = no document-root games.
    location ~ "^/profile-api/v0/internal/purge-whoami/?$" {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/profile-app/api/v0/internal-purge-whoami.php;
    }
    location ~ "^/profile-api/v0/internal/erase-user/?$" {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/profile-app/api/v0/internal-erase-user.php;
    }
    # Slug resolver — the WP JWT minter (profile-auth.php) reads users.slug here
    # to populate the looth_id `slug` claim (WP can't reach Postgres). Gate-exempt
    # (cookie gate would 403 a cookieless server-to-server call); loopback + the
    # X-LG-Internal-Auth secret guard it. ?wp_user_id=<int> in the query string.
    location ~ "^/profile-api/v0/internal/slug/?$" {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/profile-app/api/v0/internal-slug.php;
    }
    # Hub → bell ingest (notifications lane). bb-mirror's reply path and
    # archive-poc's reaction path run on the WP pool and cannot reach the
    # profile_app database — they POST the event here instead. Same loopback +
    # X-LG-Internal-Auth guard as the resolvers above. This endpoint trusts the
    # CALLER for the recipient, so it must never be internet-reachable.
    location ~ "^/profile-api/v0/internal/notify/?$" {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/buck/loothplatformv2/profile-app/api/v0/internal-notify.php;
    }
    return 404;
}

