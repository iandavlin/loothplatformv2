# Buck preview: shared header assets from buck's clone (flat block; nested css/js would not inherit the alias)
location ^~ /lg-shared/ {
    alias /home/buck/loothplatformv2/lg-shared/;
    add_header Cache-Control "public, max-age=3600";
    location ~ \.php$ { return 403; }
    try_files $uri =404;
}
