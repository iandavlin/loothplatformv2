# === preview-a VARIANT (true-preview lane) — included ONLY by
#     sites-available/preview-a.dev2.loothgroup.com.conf, NEVER the main dev2 vhost.
#     Repoints SCRIPT_FILENAME/alias from /srv (or ~/projects) -> the preview SLOT
#     (/home/ubuntu/preview-slots/slot-a) on the SAME FPM pool. Data/media roots + WP docroot stay shared.
#     Source-of-truth: platform/nginx/ in loothplatformv2 (repo-first).

# ===== events — standalone events-landing surface =====
# Owns: /events/ (PUBLIC listing of v2 `event` CPT posts on the shared shell)
# Source: /home/ubuntu/preview-slots/slot-a/events/web/  (live: /home/ubuntu/preview-slots/slot-a/events/web/)
# FPM pool: php8.3-fpm-events.sock
# Data: read-only WP MySQL (creds /etc/lg-events-db); NO WP boot, no loopback
#       for listing. Header viewer state via cached /whoami (like bb-mirror).
# Authoritative scope: STRANGLER-COORDINATION.md (events lane).
#
# Query-string note: nginx alias + try_files + fastcgi-php.conf does not
# preserve $args reliably; the front controller parses $_SERVER['REQUEST_URI'].

location ^~ /events/ {

    alias /home/ubuntu/preview-slots/slot-a/events/web/;
    try_files $uri /events/index.php;

    # Static assets are ?v=<mtime>-busted → safe to cache hard. Gate re-asserted
    # (an `if` does not inherit into nested locations).
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4)$ {
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location = /events/index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-events.sock;
        fastcgi_param SCRIPT_FILENAME /home/ubuntu/preview-slots/slot-a/events/web/index.php;
    }
    location ~ \.php$ { return 403; }
}

# /weekly/ — standalone weekly-digest pages (members-gated in PHP; Ian 6/12).
# Same pool + alias pattern as /events/.
location ^~ /weekly/ {
    # fastcgi.conf (not fastcgi-php.conf): the latter's try_files 404s
    # virtual paths like /weekly/<slug>/ — same lesson as the profile-api routes.
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-events.sock;
    fastcgi_param SCRIPT_FILENAME /home/ubuntu/preview-slots/slot-a/events/web/weekly.php;
}
location = /weekly {
    return 301 /weekly/;
}
