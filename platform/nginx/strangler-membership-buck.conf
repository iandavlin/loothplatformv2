# iandavlin/looth-platform) ONTO the monorepo serve clone, via the root-owned
# symlink /srv/membership-pages -> ~/loothplatformv2-serve/membership-pages
# (same pattern as /srv/profile-app, /srv/lg-shared, …).
# Parity verified clean: live == canonical main EXCEPT the (unpushed) Manage
# Account rename + lg-front.js/render.php/WpAssets canonical-ahead fixes; NO
# live-only edits. This file SUPERSEDES the stale, never-deployed
# membership-pages/nginx-snippet.conf (the old one-block-per-slug birds-nest).
