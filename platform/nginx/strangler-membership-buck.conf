# COPY, not a symlink). Deploy = `sudo cp platform/nginx/strangler-membership.conf
# /etc/nginx/snippets/ && sudo nginx -t && sudo systemctl reload nginx`.
#
# SERVE CONSOLIDATION (lane serve-consolidate-membership, 2026-06-28):
# Repoints alias + SCRIPT_FILENAME OFF the DEAD repo
