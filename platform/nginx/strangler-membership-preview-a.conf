# === preview-a VARIANT (true-preview lane) — included ONLY by
#     sites-available/preview-a.dev2.loothgroup.com.conf, NEVER the main dev2 vhost.
#     Repoints SCRIPT_FILENAME/alias from /srv (or ~/projects) -> the preview SLOT
#     (/home/ubuntu/preview-slots/slot-a) on the SAME FPM pool. Data/media roots + WP docroot stay shared.
#     Source-of-truth: platform/nginx/ in loothplatformv2 (repo-first).

# ===== membership-pages — standalone membership-page surfaces =====
# Single front controller (web/router.php) for the WHOLE Stripe/membership op,
# mirroring archive-poc's single render.php. Ian 2026-06-03: NO nginx birds-nest
# — ONE location matching all membership slugs → router.php (slug as a param),
# which holds the slug→{file,visibility} registry, applies the admin gate, and
# includes the matching page file. The former one-block-per-slug layout
# (membership-guide, manage-subscription, join, connect-your-patreon, welcome,
# regional-pricing-not-available, request-refund, affiliate-earnings) is folded
# into the single location below.
#
# Source-of-truth: /home/ubuntu/preview-slots/slot-a/membership-pages/
# FPM pool: php8.3-fpm-membership.sock
# Data: read-only WP MySQL + poller MySQL (creds /etc/lg-membership-db +
#       /etc/lg-poller-db; dev fallbacks in config.php).
# Authoritative scope: STRANGLER-COORDINATION.md §0b (standalone invariant)
#                      + relay-stripe-pages-standalone-and-shell.md (2026-06-03).

# Asset mount (LG_MEMBERSHIP_PUBLIC_PATH = /membership-pages) — serves the web/
# static files (CSS/JS, ?v=<mtime>-busted) that every surface links to. Front
# controllers are reached via the slug router below, never here; PHP denied.
# Prefix-matched (^~) so it wins over the slug regex and is never PHP-executed.
location ^~ /membership-pages/ {
    alias /home/ubuntu/preview-slots/slot-a/membership-pages/web/;
    location ~ \.php$ { return 403; }
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif|mp4)$ {
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }
    try_files $uri =404;
}

# ONE front controller for ALL membership slugs. The slug is captured ($1) and
# passed to router.php, which dispatches + gates. Trailing slash and any deeper
# path under a slug both resolve to the same router (the router only reads the
# slug); ?$args reaches PHP via QUERY_STRING for the transient landings
# (welcome / regional-pricing-not-available) and the onboarded-callback pages.
location ~ ^/(membership-guide|manage-subscription|connect-your-patreon|lgjoin|lggift-buy|lggift|my-gifts|affiliate-earnings|request-refund|test-checklist|welcome|regional-pricing-not-available|join)(?:/.*)?$ {
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-membership.sock;
    fastcgi_param SCRIPT_FILENAME /home/ubuntu/preview-slots/slot-a/membership-pages/web/router.php;
    fastcgi_param LG_MS_SLUG $1;
    fastcgi_param QUERY_STRING $args;
}
