[membership]
user = membership
group = membership
listen = /run/php/php8.3-fpm-membership.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
pm = ondemand
pm.max_children = 2
pm.max_requests = 500
pm.process_idle_timeout = 5s
request_terminate_timeout = 60s
php_admin_value[error_log] = /var/log/php-fpm/membership-error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 128M
catch_workers_output = yes
