[archive-poc]
user = archive-poc
group = archive-poc

listen = /run/php/php8.3-fpm-archive-poc.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = ondemand
pm.max_children = 2
pm.max_requests = 500
pm.process_idle_timeout = 5s

request_terminate_timeout = 60s

php_admin_value[error_log] = /var/log/php-fpm/archive-poc-error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size] = 64M

catch_workers_output = yes

; --- SQLite→Postgres read cutover (archive-poc lane, 2026-06-05) ---
; Points all env-driven reads (lg_archive_poc_pdo) at the PG `discovery` schema.
; INSTANT REVERT: comment this line + `sudo systemctl reload php8.3-fpm` → falls
; back to the intact index.sqlite. Keep both paths working until PG is proven.
env[LG_ARCHIVE_POC_DSN] = "pgsql:host=/var/run/postgresql;dbname=looth"
