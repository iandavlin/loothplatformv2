[looth-dev]
user = looth-dev
group = looth-dev

listen = /run/php/php8.3-fpm-looth-dev.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 8
pm.max_requests = 500

request_terminate_timeout = 60s

; (loosened so WP_DEBUG_LOG can redirect to wp-content/debug.log)
php_value[error_log] = /var/www/dev/wp-content/debug.log
php_flag[log_errors] = on
php_admin_value[memory_limit] = 512M
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size] = 64M

catch_workers_output = yes
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
