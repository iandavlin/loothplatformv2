<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Looth — offline</title>
<style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fbfbf8;color:#323532;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;text-align:center;padding:24px}img{width:72px;height:72px;border-radius:16px;margin-bottom:16px}h1{font:600 20px/1.2 Georgia,serif;color:#1a1d1a;margin:0 0 6px}p{color:#6b6f6b;margin:0}.lo-btn{margin-top:18px;display:inline-block;border:0;border-radius:999px;padding:12px 22px;background:#87986a;color:#fff;font:600 15px/1 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;cursor:pointer}.lo-btn:active{background:#6b7c52}.lo-btn[disabled]{opacity:.6;cursor:default}.lo-status{margin-top:12px;min-height:18px;font-size:13px;color:#6b6f6b}</style>
</head><body><div><img src="/icons/icon-192.png" alt=""><h1>You're offline</h1><p>Looth needs a connection to load this page.</p>
<button id="lo-retry" class="lo-btn" type="button">Refresh connection</button>
<div id="lo-status" class="lo-status" role="status" aria-live="polite"></div></div>
<script>
/* One-tap reconnect (hub-reconnect lane 2026-06-25): the SW serves this page when
   a navigation fetch fails. On a standalone PWA there is no browser reload button,
   so the user was stranded "hunting for a reload." This probes the network and, the
   moment it is reachable again, reloads the SAME url the user was trying to open
   (the address bar still points at it — respondWith doesn't change location). */
(function () {
  var btn = document.getElementById('lo-retry');
  var status = document.getElementById('lo-status');
  var busy = false;
  function reconnect(manual) {
    if (busy) return;
    busy = true;
    if (manual) { btn.disabled = true; btn.textContent = 'Reconnecting…'; }
    // Probe a tiny same-origin asset, bypassing the HTTP cache so a 200 genuinely
    // means the network is back (the SW doesn't intercept non-/icons/ GETs).
    fetch('/manifest.json', { cache: 'no-store' }).then(function (r) {
      if (!r || !r.ok) throw 0;
      location.reload();                       // back online -> load the real page
    }).catch(function () {
      busy = false;
      if (manual) {
        btn.disabled = false;
        btn.textContent = 'Refresh connection';
        status.textContent = 'Still offline — check your connection and try again.';
      }
    });
  }
  btn.addEventListener('click', function () { status.textContent = ''; reconnect(true); });
  // Auto-heal: reload the instant the OS reports connectivity is back.
  window.addEventListener('online', function () { reconnect(false); });
  // Belt-and-braces (navigator.onLine can lag/lie on mobile): quietly re-probe
  // every few seconds and reload as soon as a request succeeds, no tap needed.
  setInterval(function () { if (!busy && navigator.onLine !== false) reconnect(false); }, 5000);
})();
</script>
</body></html>
