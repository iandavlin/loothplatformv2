# ============================================================================
# archive-poc nginx routes — PASTE inside the loothgroup.com server { } block
# (the HTTPS server block, listen 443), ABOVE the catch-all `location /`.
#
# Assumes:
#   - archive-poc PHP-FPM pool socket is at /run/php/php8.3-fpm-archive-poc.sock
#   - looth-live PHP-FPM pool socket is at /run/php/php8.3-fpm-looth-live.sock
#     (rename if your live pool is different — used only by the loopback _sync route)
#   - app installed at /srv/archive-poc/
# ============================================================================

# Static frontend + SSR'd index.php for /archive-poc/
location ^~ /archive-poc/ {
    alias /srv/archive-poc/web/;
    index index.php;
    try_files $uri $uri/ /archive-poc/index.php?$args;

    # Only index.php executes; deny any other .php in the static tree.
    location = /archive-poc/index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
    location ~ \.php$ { return 403; }
}

# Read-only JSON API endpoints (search, item, etc.)
# These talk to the archive-poc fpm pool — they DON'T need WP loaded.
location ~ ^/archive-api/v0/(search|item|rows-more|comments)(\.php)?(/.*)?$ {
    rewrite ^/archive-api/v0/([^/]+)(\.php)?(.*)$ /$1.php$3 break;
    fastcgi_pass unix:/run/php/php8.3-fpm-archive-poc.sock;
    include snippets/fastcgi-php.conf;
    fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/$1.php;
    fastcgi_param DOCUMENT_ROOT /srv/archive-poc/api/v0;
}

# Comment compose gate + WRITE — looth-live FPM pool (boots WP). The posting gate
# is the WP login cookie (an unbridged member is anon to /whoami but has a valid WP
# cookie), so it can't live on the whoami-gated archive-poc read pool. Browser-
# reachable (NOT loopback): GET → auth state + nonce; POST → discovery.comments.
location = /archive-api/v0/comment-post {
    fastcgi_pass unix:/run/php/php8.3-fpm-looth-live.sock;
    include snippets/fastcgi-php.conf;
    fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/comment-post.php;
    fastcgi_param DOCUMENT_ROOT /srv/archive-poc/api/v0;
}

# Comment reaction WRITE — looth-live FPM pool (boots WP), same WP-cookie gate +
# nonce as comment-post (so unbridged members can react). POST only; one reaction
# per (comment,user) in discovery.comment_reactions.
location = /archive-api/v0/comment-react {
    fastcgi_pass unix:/run/php/php8.3-fpm-looth-live.sock;
    include snippets/fastcgi-php.conf;
    fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/comment-react.php;
    fastcgi_param DOCUMENT_ROOT /srv/archive-poc/api/v0;
}

# Card reaction WRITE+GET — looth-live FPM pool (boots WP), same WP-cookie gate +
# nonce as comment-react. Reactions on feed cards (topics + content); 'like' folds
# in here as one slug. GET -> nonce + my_reactions; POST -> toggle card_reactions.
location = /archive-api/v0/card-react {
    fastcgi_pass unix:/run/php/php8.3-fpm-looth-live.sock;
    include snippets/fastcgi-php.conf;
    fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/card-react.php;
    fastcgi_param DOCUMENT_ROOT /srv/archive-poc/api/v0;
}

# Loopback-only reindex endpoint — fired by the mu-plugin on save_post.
# Routes to looth-live FPM pool because the indexer needs WP loaded.
location = /archive-api/v0/_sync {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    fastcgi_pass unix:/run/php/php8.3-fpm-looth-live.sock;
    include snippets/fastcgi-php.conf;
    fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/_sync.php;
    fastcgi_param DOCUMENT_ROOT /srv/archive-poc/api/v0;
}

# Loopback-only blob materialize endpoint — fired by the materializer mu-plugin.
# Routes to looth-live FPM pool: needs WP loaded to resolve PostContext AND
# peer-auths to the write-side pg role for discovery.article_blobs.
location = /archive-api/v0/_materialize {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    fastcgi_pass unix:/run/php/php8.3-fpm-looth-live.sock;
    include snippets/fastcgi-php.conf;
    fastcgi_param SCRIPT_FILENAME /srv/archive-poc/api/v0/_materialize.php;
    fastcgi_param DOCUMENT_ROOT /srv/archive-poc/api/v0;
}
