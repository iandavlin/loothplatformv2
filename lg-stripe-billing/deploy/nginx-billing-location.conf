# nginx location block for the Slim billing app, mounted at /billing/
# alongside the WordPress install at /var/www/dev/.
#
# Install: paste this block inside the existing
#          /etc/nginx/sites-available/dev.loothgroup.com server { } block
#          (the 443 one), above the catch-all `location ~ \.php$` block.
#
#          Then: sudo nginx -t && sudo systemctl reload nginx

location ^~ /billing {
    alias /home/ccdev/lg-stripe-billing/public;
    try_files $uri $uri/ @billing_rewrite;

    location ~ ^/billing/.*\.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-lg-billing-dev.sock;
        fastcgi_read_timeout 60;
        # alias requires SCRIPT_FILENAME from $request_filename, not $document_root
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
}

location @billing_rewrite {
    rewrite ^/billing/?(.*)$ /billing/index.php?/$1 last;
}
