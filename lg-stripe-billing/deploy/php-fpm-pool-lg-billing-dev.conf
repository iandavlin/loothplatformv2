; lg-billing-dev — php-fpm pool for the Slim app on dev.loothgroup.com.
;
; Install: sudo cp deploy/php-fpm-pool-lg-billing-dev.conf \
;             /etc/php/8.3/fpm/pool.d/lg-billing-dev.conf
;          sudo systemctl reload php8.3-fpm
;
; For dev only. Production pool will run as user `ubuntu` (or
; dedicated `lg-billing`) on a path owned by ubuntu.

[lg-billing-dev]
user = ccdev
group = ccdev

listen = /run/php/php8.3-fpm-lg-billing-dev.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = ondemand
pm.max_children = 4
pm.max_requests = 500
pm.process_idle_timeout = 10s

request_terminate_timeout = 60s

php_admin_value[error_log] = /var/log/php-fpm/lg-billing-dev-error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 128M

catch_workers_output = yes

; Pass through env so dotenv has something to load.
clear_env = no
