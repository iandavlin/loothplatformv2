# ----- profile-app media store: AUTH front controller (Ian 6/12) -----
# Mirrors the LIVE block in /etc/nginx/snippets/strangler-profile-app.conf.
# Decision in PHP (Visibility::fileVisible — avatars/banners public,
# gallery/resumes per the owner's visibility + master switch), bytes served
# by nginx via X-Accel-Redirect to the internal alias.
location ^~ /profile-media/ {
    if ($loothdev_is_authorized != 1) { return 403; }
    rewrite ^/profile-media/(.*)$ /profile-media-auth?path=$1 last;
}
location = /profile-media-auth {
    internal;
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
    fastcgi_param SCRIPT_FILENAME /srv/profile-app/web/media.php;
}
location ^~ /profile-media-internal/ {
    internal;
    alias /srv/profile-app-media/;
}

# ----- DM image attachments: ACCESS-CONTROLLED proxy (lane: message-images) -----
# DMs are PRIVATE — unlike /profile-media/ (avatars/banners public), message images
# are served ONLY to a thread participant. web/message-media.php asserts
# Messaging::isParticipant(viewer, thread) and answers 404 on any miss (never reveals
# existence); bytes come from the DEDICATED message R2 bucket (or the local fallback
# below) via X-Accel-Redirect. Mirrors the profile-media block.
location ^~ /message-media/ {
    if ($loothdev_is_authorized != 1) { return 403; }   # dev cookie gate only; live var is 1
    rewrite ^/message-media/(.*)$ /message-media-auth?path=$1 last;
}
location = /message-media-auth {
    internal;
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
    fastcgi_param SCRIPT_FILENAME /srv/profile-app/web/message-media.php;
}
location ^~ /message-media-internal/ {
    internal;
    alias /srv/profile-app-message-media/;
}
