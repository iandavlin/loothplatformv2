# ===== profile-app — strangler for member profile 2.0 =====
# Owns: /profile/edit, /u/<slug>, /u/<slug>/edit, /p/<slug>,
#       /profile-api/v0/*, /directory/members, /members/* hijack redirects.
# Source: /home/ubuntu/projects/profile-app/
# FPM pool: php8.3-fpm-profile-app.sock
# Authoritative scope: /home/ubuntu/projects/docs/STRANGLER-COORDINATION.md


# /profile/edit (and /profile/edit/) → SSR editor (web/edit.php)
location ^~ /profile/edit {
    if ($loothdev_is_authorized != 1) { return 403; }
    alias /home/ubuntu/projects/profile-app/web/;
    rewrite ^/profile/edit/?$ /profile/edit/edit.php last;

    location = /profile/edit/edit.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/profile-app/web/edit.php;
    }

    # Static assets under /profile/edit/<file>.{css,js,…}
    location ~ ^/profile/edit/([\w\-.]+\.(css|js|svg|png|jpg))$ {
        alias /home/ubuntu/projects/profile-app/web/$1;
    }

    location ~ \.php$ { return 403; }
}

# /u/<slug> public read-only view + /u/<slug>/edit alias
# NB: include fastcgi.conf (NOT snippets/fastcgi-php.conf) so we skip
# the try_files-against-document_root check that 404s on URIs without .php.
location ~ "^/u/([\w\-]+)/edit/?$" {
    if ($loothdev_is_authorized != 1) { return 403; }
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
    fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/profile-app/web/u-edit.php;
    fastcgi_param QUERY_STRING    slug=$1&$args;
}
location ~ "^/u/([\w\-]+)/?$" {
    if ($loothdev_is_authorized != 1) { return 403; }
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
    fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/profile-app/web/u.php;
    fastcgi_param QUERY_STRING    slug=$1&$args;
}

location ~ "^/p/([\w\-]+)/?$" {
    if ($loothdev_is_authorized != 1) { return 403; }
    include fastcgi.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
    fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/profile-app/web/p.php;
    fastcgi_param QUERY_STRING    slug=$1&$args;
}

# BB profile hijack (dev only): the canonical profile page is now /u/<slug>.
# /members/<nicename>/                  -> 302 /u/<nicename>
# /members/<nicename>/profile/          -> 302 /u/<nicename>
# /members/<nicename>/profile/edit/     -> 302 /profile/edit
# Other BB sub-routes (forums, connections, photos, ...) still hit WP.
location ~ "^/members/([\w\-]+)/profile/edit/?$" {
    return 302 /profile/edit;
}
location ~ "^/members/([\w\-]+)(/profile)?/?$" {
    return 302 /u/$1;
}

# Internal service channel (poller <-> profile-app, shared-secret auth at PHP layer).
# Must be ABOVE the main /profile-api/v0/ block so the more-specific ^~ wins.
location ^~ /profile-api/v0/internal/ {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    # No cookie gate — internal only, X-LG-Internal-Auth verified in PHP
    # via hash_equals() against /etc/lg-internal-secret.
    # Route everything under /internal/ to the single PHP handler via explicit
    # SCRIPT_FILENAME — keeps things simple, no try_files = no document-root games.
    location ~ "^/profile-api/v0/internal/purge-whoami/?$" {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/profile-app/api/v0/internal-purge-whoami.php;
    }
    # Slug resolver — the WP JWT minter (profile-auth.php) reads users.slug here
    # to populate the looth_id `slug` claim (WP can't reach Postgres). Gate-exempt
    # (cookie gate would 403 a cookieless server-to-server call); loopback + the
    # X-LG-Internal-Auth secret guard it. ?wp_user_id=<int> in the query string.
    location ~ "^/profile-api/v0/internal/slug/?$" {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME /home/ubuntu/projects/profile-app/api/v0/internal-slug.php;
    }
    return 404;
}

location ^~ /profile-api/v0/ {
    alias /home/ubuntu/projects/profile-app/api/v0/;

    rewrite "^/profile-api/v0/hooks/user-created/?$"        /profile-api/v0/user-created.php last;
    rewrite "^/profile-api/v0/user/([0-9a-fA-F-]{36})/?$"   /profile-api/v0/user.php?uuid=$1 last;
    # DM image attachment upload (lane: message-images) — MUST precede any
    # /me/messages/<uuid> rewrite so "<uuid>/image" isn't swallowed by the thread route.
    rewrite "^/profile-api/v0/me/messages/image/?$"                  /profile-api/v0/me-message-image.php last;
    rewrite "^/profile-api/v0/me/messages/([0-9a-f-]{36})/image/?$"  /profile-api/v0/me-message-image.php?uuid=$1 last;
    rewrite "^/profile-api/v0/me/?$"                        /profile-api/v0/me.php             last;
    rewrite "^/profile-api/v0/me/about/?$"                  /profile-api/v0/me-about.php       last;
    rewrite "^/profile-api/v0/me/header/?$"                  /profile-api/v0/me-header.php      last;
    rewrite "^/profile-api/v0/me/location/?$"               /profile-api/v0/me-location.php    last;
    rewrite "^/profile-api/v0/me/location/search/?$"        /profile-api/v0/me-location-search.php last;
    rewrite "^/profile-api/v0/me/socials/?$"                /profile-api/v0/me-socials.php     last;
    rewrite "^/profile-api/v0/me/craft/?$"                  /profile-api/v0/me-craft.php       last;
    rewrite "^/profile-api/v0/me/preview/?$"                /profile-api/v0/me-preview.php     last;
    rewrite "^/profile-api/v0/me/claim/?$"                  /profile-api/v0/me-claim.php       last;
    rewrite "^/profile-api/v0/me/section-order/?$"          /profile-api/v0/me-section-order.php last;
    rewrite "^/profile-api/v0/me/name/?$"                   /profile-api/v0/me-name.php        last;
    rewrite "^/profile-api/v0/me/practices/?$"              /profile-api/v0/me-practices.php   last;
    rewrite "^/profile-api/v0/me/practices/([0-9a-fA-F-]{36})/?$"  /profile-api/v0/me-practices.php?uuid=$1 last;
    rewrite "^/profile-api/v0/practice/([0-9a-fA-F-]{36})/?$"  /profile-api/v0/practice.php?uuid=$1 last;
    rewrite "^/profile-api/v0/schema/?$"                    /profile-api/v0/schema.php         last;
    rewrite "^/profile-api/v0/catalogs/(instruments|skills|scenes|credentials)/?$"  /profile-api/v0/catalogs.php?kind=$1  last;
    rewrite "^/profile-api/v0/me/instruments/?$"            /profile-api/v0/me-instruments.php  last;
    rewrite "^/profile-api/v0/me/skills/?$"                 /profile-api/v0/me-skills.php       last;
    rewrite "^/profile-api/v0/me/scenes/?$"                 /profile-api/v0/me-scenes.php       last;
    rewrite "^/profile-api/v0/me/highlights/?$"             /profile-api/v0/me-highlights.php   last;
    rewrite "^/profile-api/v0/me/credentials/?$"            /profile-api/v0/me-credentials.php  last;
    rewrite "^/profile-api/v0/me/credentials/([0-9]+)/?$"   /profile-api/v0/me-credentials.php?id=$1  last;
    rewrite "^/profile-api/v0/reports/?$"                   /profile-api/v0/reports.php         last;
    rewrite "^/profile-api/v0/directory/members/?$"         /profile-api/v0/directory-members.php  last;

    # Slice 3.5: strangler identity contract (internal/ is handled by an
    # outer ^~ block above for cookie-gate exemption + localhost lock).
    rewrite "^/profile-api/v0/whoami/?$"                    /profile-api/v0/whoami.php          last;
    rewrite "^/profile-api/v0/users/?$"                     /profile-api/v0/users.php           last;

    # Sponsor brand store (sponsor-pages v2, Lane A) — PUBLIC read.
    #   /sponsor/<slug>  → ?slug=  ;  bare /sponsor preserves ?wp_id= / ?email=
    rewrite "^/profile-api/v0/sponsor/([a-z0-9-]{1,64})/?$"  /profile-api/v0/sponsor.php?slug=$1 last;
    rewrite "^/profile-api/v0/sponsor/?$"                    /profile-api/v0/sponsor.php         last;

location = /profile-api/v0/user-created.php {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Schema is public — still behind the dev cookie gate (whole site is).
    location = /profile-api/v0/schema.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Public read (auth-aware via JWT cookie).
    location = /profile-api/v0/user.php {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Authed /me endpoints — JWT-gated in PHP; bypass dev cookie gate when
    # a Bearer token is present (PHP enforces real auth either way).
    location ~ "^/profile-api/v0/(me|me-header|me-about|me-location|me-socials|me-preview|me-claim|me-section-order|me-name|me-instruments|me-skills|me-scenes|me-highlights|me-credentials|me-location-search|me-practices|me-craft|me-message-image)\.php$" {
        set $profile_api_gate $loothdev_is_authorized;
        if ($http_authorization ~* "^Bearer ") { set $profile_api_gate 1; }
        if ($profile_api_gate != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Public/auth-aware endpoints.
    location ~ "^/profile-api/v0/(catalogs|directory-members|reports|practice|whoami|users|sponsor)\.php$" {
        if ($loothdev_is_authorized != 1) { return 403; }
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    location ~ \.php$ { return 403; }
}

