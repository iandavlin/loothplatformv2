# profile-app nginx snippet — LIVE.
#
# Inserted on live via:
#   /etc/nginx/snippets/profile-app.conf  (this file)
#   then `include snippets/profile-app.conf;` inside loothgroup.com's
#   SSL server block, ABOVE the catch-all `location /` for WP.
#
# Differences from dev:
#   - No cookie gate ($loothdev_is_authorized doesn't exist on live).
#   - Read endpoint is currently open (slice zero — auth comes in slice one).

    location ^~ /profile-api/v0/ {
        alias /srv/profile-app/api/v0/;

        rewrite "^/profile-api/v0/hooks/user-created/?$"        /profile-api/v0/user-created.php last;
        rewrite "^/profile-api/v0/user/([0-9a-fA-F-]{36})/?$"   /profile-api/v0/user.php?uuid=$1 last;

        # Webhook — loopback only.
        location = /profile-api/v0/user-created.php {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }

        # Read — open (slice zero).
        location = /profile-api/v0/user.php {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }

        location ~ \.php$ { return 403; }
    }
