# profile-app nginx snippet — paste inside the SSL server block in
# /etc/nginx/sites-available/dev.loothgroup.com.conf, ABOVE the catch-all
# `location / { ... }`.
#
# /profile-api/v0/hooks/user-created → POST. Loopback-only. Hook-secret gated.
# /profile-api/v0/user/<uuid>        → GET. Public read (auth comes in slice 1).
#
# Both run on the profile-app FPM pool.

    location ^~ /profile-api/v0/ {
        alias /home/ubuntu/projects/profile-app/api/v0/;

        # Clean URLs → underlying .php
        rewrite ^/profile-api/v0/hooks/user-created/?$  /profile-api/v0/user-created.php  last;
        rewrite ^/profile-api/v0/user/([0-9a-fA-F-]{36})/?$ /profile-api/v0/user.php?uuid=$1  last;

        # Webhook — loopback only (mu-plugin fires from 127.0.0.1).
        location = /profile-api/v0/user-created.php {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }

        # Read — cookie-gated for now (auth proper comes when edit endpoints land).
        location = /profile-api/v0/user.php {
            if ($loothdev_is_authorized != 1) { return 403; }
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm-profile-app.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }

        # Default: deny anything else under /profile-api/v0/.
        location ~ \.php$ { return 403; }
    }
