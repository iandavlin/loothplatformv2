# Drop-in for /etc/nginx/conf.d/profile-app-rate-limit.conf
#
# Throttles the Nominatim search proxy so a runaway autocomplete client
# can't melt the upstream. Public Nominatim allows 1 req/sec; we cap at
# 5/sec per-IP with a 10-req burst (matches a fast typist's debounce
# bursts without falling off a cliff).
#
# Goes in http{} — that's nginx.conf, not a server{} block.

limit_req_zone $binary_remote_addr zone=looth_nominatim:10m rate=5r/s;

