[profile-app]
user = profile-app
group = profile-app

listen = /run/php/php8.3-fpm-profile-app.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = ondemand
pm.max_children = 2
pm.max_requests = 500
pm.process_idle_timeout = 5s

request_terminate_timeout = 60s

php_admin_value[error_log] = /var/log/php-fpm/profile-app-error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 256M

catch_workers_output = yes
